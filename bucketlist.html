<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bucket List</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
/* --- General Font & Body --- */
body {
  font-family: 'Press Start 2P', monospace;
  background: #d97bb3;
  margin: 0;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* --- Main Bucket List Window --- */
.window {
  width: 500px;
  height: 600px;
  background: #c0c0c0;
  border: 2px solid #000;
  box-shadow: 4px 4px 0 #7a7a7a;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* --- Title Bar --- */
.title-bar {
  background: #000080;
  color: white;
  padding: 4px 8px;
  font-size: 13px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* --- Window Buttons --- */
.buttons span {
  display: inline-block;
  width: 16px;
  height: 16px;
  margin-left: 4px;
  background: #c0c0c0;
  border: 1px solid #000;
  text-align: center;
  line-height: 14px;
  font-size: 11px;
  color: black;
  cursor: default;
}

/* --- Menu Bar --- */
.menu {
  background: #c0c0c0;
  padding: 4px 8px;
  font-size: 12px;
  border-bottom: 1px solid #808080;
}

.menu-item.clickable {
  cursor: pointer;
  color: #0000AA;
}
.menu-item.clickable:hover {
  background-color: #000080;
  color: #FFFFFF;
}

/* --- Content Area --- */
.content {
  background: #ffffff;
  flex-grow: 1;
  overflow-y: auto;
  padding: 12px;
  font-size: 13px;
  line-height: 1.4;
}

/* --- Individual Bucket Item --- */
.bucket-item {
  margin-bottom: 16px;
  padding: 10px;
  border: 1px solid #c0c0c0;
  background: #f8f8f8;
}

.bucket-item.completed {
  background: #e0ffe0;
  opacity: 0.85;
}

.item-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.checkmark {
  width: 20px;
  height: 20px;
  cursor: pointer;
  accent-color: #000080;
}

.item-title {
  flex-grow: 1;
  font-weight: bold;
  word-break: break-word;
}

.item-title.completed-text {
  text-decoration: line-through;
  color: #666;
}

.delete-btn {
  background: #c0c0c0;
  border: 2px solid #FFF;
  box-shadow: inset -1px -1px 0 #808080, inset 1px 1px 0 #FFF;
  cursor: pointer;
  font-family: 'MS Sans Serif', Tahoma, sans-serif;
  font-size: 11px;
  padding: 2px 6px;
}

.delete-btn:hover {
  box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #FFF;
}

.item-details {
  margin-left: 30px;
  font-size: 11px;
  color: #555;
}

.completed-date {
  margin: 5px 0;
  color: #2d6a2d;
}

.item-notes {
  margin: 5px 0;
  font-style: italic;
}

.item-image {
  max-width: 100%;
  max-height: 150px;
  margin-top: 5px;
}

.edit-btn, .add-image-btn, .add-notes-btn {
  background: #c0c0c0;
  border: 1px solid #808080;
  cursor: pointer;
  font-family: 'MS Sans Serif', Tahoma, sans-serif;
  font-size: 10px;
  margin-right: 5px;
  margin-top: 5px;
  padding: 2px 5px;
}

/* --- Popup --- */
.bucket-popup {
  border: 2px solid #000;
  background: #C0C0C0;
  position: absolute;
  top: 100px;
  left: 50%;
  transform: translateX(-50%);
  display: none;
  width: 400px;
  min-width: 300px;
  max-width: 500px;
  z-index: 1000;
  box-shadow: 4px 4px 0 #7a7a7a;
  flex-direction: column;
}

.bucket-popup .title-bar {
  background: #000080;
  color: #FFF;
  font-family: 'MS Sans Serif', Tahoma, sans-serif;
  font-size: 13px;
  padding: 4px 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: move;
}

.bucket-popup .buttons span {
  cursor: pointer;
}

.bucket-popup .content {
  background: #dcdcdc;
  padding: 12px;
  font-family: 'MS Sans Serif', Tahoma, sans-serif;
  font-size: 13px;
  overflow: auto;
  max-height: 400px;
}

/* --- Form Elements --- */
.retro-button {
  font-family: 'MS Sans Serif', Tahoma, sans-serif;
  font-size: 13px;
  padding: 4px 8px;
  background: #C0C0C0;
  border: 2px solid #FFF;
  box-shadow: inset -2px -2px 0 #808080, inset 2px 2px 0 #FFF;
  cursor: pointer;
  color: #000;
  margin-top: 10px;
}

.retro-button:hover {
  box-shadow: inset 2px 2px 0 #808080, inset -2px -2px 0 #FFF;
}

input, textarea {
  width: 100%;
  box-sizing: border-box;
  margin-bottom: 10px;
  font-family: 'MS Sans Serif', Tahoma, sans-serif;
  font-size: 12px;
  border: 1px solid #808080;
}

/* --- Progress Bar --- */
.progress-section {
  padding: 8px;
  background: #c0c0c0;
  border-top: 1px solid #808080;
  font-size: 11px;
}

.progress-bar-bg {
  background: #ffffff;
  border: 1px solid #000;
  height: 16px;
  margin-top: 4px;
}

.progress-bar-fill {
  background: #000080;
  height: 100%;
  width: 0%;
}

/* --- Mobile --- */
@media (max-width: 768px) {
  .window {
    position: fixed !important;
    inset: 0 !important;
    width: 100vw !important;
    height: 100vh !important;
    margin: 0 !important;
    border-radius: 0;
    box-shadow: none;
  }
  body, html {
    overflow: hidden;
  }
}
</style>
</head>

<body>

<div class="window">
  <div class="title-bar">
    📝 Bucket List
    <div class="buttons">
      <span>_</span>
      <span>□</span>
      <span>X</span>
    </div>
  </div>

  <div class="menu">
    File &nbsp; Edit &nbsp; View &nbsp;
    <span class="menu-item clickable" id="openAddWindow">➕ Add Item</span> &nbsp;
    Help
  </div>

  <div class="content" id="bucketContainer">
    <!-- Bucket items will appear here -->
  </div>

  <div class="progress-section">
    Progress: <span id="progressPercent">0</span>%
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
  </div>
</div>

<!-- Add/Edit Popup -->
<div class="bucket-popup" id="bucketPopup">
  <div class="title-bar" id="popupTitleBar">
    Add Bucket List Item
    <div class="buttons">
      <span id="closePopup">X</span>
    </div>
  </div>
  <div class="content">
    <form id="bucketForm">
      <input type="text" id="itemTitle" placeholder="What do you want to do?" required>
      <textarea id="itemNotes" placeholder="Notes (optional)" rows="3"></textarea>
      <input type="text" id="itemImage" placeholder="Image URL (optional)">
      <button type="button" id="submitButton" class="retro-button">Save Item</button>
    </form>
  </div>
</div>

<!-- Edit Notes/Image Popup -->
<div class="bucket-popup" id="editPopup" style="display:none;">
  <div class="title-bar" id="editTitleBar">
    Edit Item
    <div class="buttons">
      <span id="closeEditPopup">X</span>
    </div>
  </div>
  <div class="content">
    <form id="editForm">
      <textarea id="editNotes" placeholder="Your notes..." rows="4"></textarea>
      <input type="text" id="editImage" placeholder="Image URL">
      <input type="date" id="editDate">
      <button type="button" id="saveEditButton" class="retro-button">Save Changes</button>
    </form>
  </div>
</div>

<script>
// --- Data storage (localStorage) ---
let bucketItems = [];

// Load from localStorage
function loadData() {
  const saved = localStorage.getItem('bucketList');
  if (saved) {
    bucketItems = JSON.parse(saved);
  } else {
    // Sample items
    bucketItems = [
      { id: Date.now(), title: "Visit Japan", completed: false, notes: "", image: "", completedDate: null },
      { id: Date.now()+1, title: "Learn to code", completed: true, notes: "Built this website!", image: "", completedDate: "2025-03-15" }
    ];
  }
  render();
}

// Save to localStorage
function saveData() {
  localStorage.setItem('bucketList', JSON.stringify(bucketItems));
  render();
}

// Render all items
function render() {
  const container = document.getElementById('bucketContainer');
  if (!container) return;
  
  container.innerHTML = '';
  
  const incomplete = bucketItems.filter(item => !item.completed);
  const complete = bucketItems.filter(item => item.completed);
  const sorted = [...incomplete, ...complete];
  
  sorted.forEach(item => {
    const div = document.createElement('div');
    div.className = `bucket-item ${item.completed ? 'completed' : ''}`;
    
    const completedClass = item.completed ? 'completed-text' : '';
    
    div.innerHTML = `
      <div class="item-header">
        <input type="checkbox" class="checkmark" data-id="${item.id}" ${item.completed ? 'checked' : ''}>
        <span class="item-title ${completedClass}">${escapeHtml(item.title)}</span>
        <button class="delete-btn" data-id="${item.id}">✗</button>
      </div>
      <div class="item-details">
        ${item.completedDate ? `<div class="completed-date">✅ Completed: ${item.completedDate}</div>` : ''}
        ${item.notes ? `<div class="item-notes">📝 ${escapeHtml(item.notes)}</div>` : ''}
        ${item.image ? `<img src="${escapeHtml(item.image)}" class="item-image" onerror="this.style.display='none'">` : ''}
        <div>
          <button class="edit-btn" data-id="${item.id}" data-type="notes">✏️ Edit Notes</button>
          <button class="edit-btn" data-id="${item.id}" data-type="image">🖼️ Add/Change Image</button>
          <button class="edit-btn" data-id="${item.id}" data-type="date">📅 Set Completed Date</button>
        </div>
      </div>
    `;
    container.appendChild(div);
  });
  
  // Update progress
  const total = bucketItems.length;
  const completedCount = bucketItems.filter(i => i.completed).length;
  const percent = total === 0 ? 0 : Math.round((completedCount / total) * 100);
  document.getElementById('progressPercent').innerText = percent;
  document.getElementById('progressFill').style.width = percent + '%';
  
  // Attach event listeners
  document.querySelectorAll('.checkmark').forEach(cb => {
    cb.addEventListener('change', (e) => {
      const id = parseInt(e.target.dataset.id);
      toggleComplete(id);
    });
  });
  
  document.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const id = parseInt(e.target.dataset.id);
      deleteItem(id);
    });
  });
  
  document.querySelectorAll('.edit-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const id = parseInt(e.target.dataset.id);
      const type = e.target.dataset.type;
      openEditPopup(id, type);
    });
  });
}

// Helper to escape HTML
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

// Toggle complete status
function toggleComplete(id) {
  const item = bucketItems.find(i => i.id === id);
  if (item) {
    item.completed = !item.completed;
    if (item.completed) {
      item.completedDate = new Date().toISOString().split('T')[0];
    } else {
      item.completedDate = null;
    }
    saveData();
  }
}

// Delete item
function deleteItem(id) {
  if (confirm('Delete this item?')) {
    bucketItems = bucketItems.filter(i => i.id !== id);
    saveData();
  }
}

// --- Popup management ---
const popup = document.getElementById('bucketPopup');
const editPopup = document.getElementById('editPopup');
let currentEditId = null;
let currentEditType = null;

document.getElementById('openAddWindow').addEventListener('click', () => {
  document.getElementById('itemTitle').value = '';
  document.getElementById('itemNotes').value = '';
  document.getElementById('itemImage').value = '';
  popup.style.display = 'flex';
});

document.getElementById('closePopup').addEventListener('click', () => {
  popup.style.display = 'none';
});

document.getElementById('closeEditPopup').addEventListener('click', () => {
  editPopup.style.display = 'none';
});

// Submit new item
document.getElementById('submitButton').addEventListener('click', () => {
  const title = document.getElementById('itemTitle').value.trim();
  if (!title) {
    alert('Please enter a title!');
    return;
  }
  
  const newItem = {
    id: Date.now(),
    title: title,
    completed: false,
    notes: document.getElementById('itemNotes').value.trim(),
    image: document.getElementById('itemImage').value.trim(),
    completedDate: null
  };
  
  bucketItems.push(newItem);
  saveData();
  popup.style.display = 'none';
});

// Open edit popup
function openEditPopup(id, type) {
  currentEditId = id;
  currentEditType = type;
  const item = bucketItems.find(i => i.id === id);
  if (!item) return;
  
  if (type === 'notes') {
    document.getElementById('editNotes').value = item.notes || '';
    document.getElementById('editImage').value = item.image || '';
    document.getElementById('editDate').value = item.completedDate || '';
    editPopup.style.display = 'flex';
  } else if (type === 'image') {
    document.getElementById('editNotes').value = item.notes || '';
    document.getElementById('editImage').value = item.image || '';
    document.getElementById('editDate').value = item.completedDate || '';
    editPopup.style.display = 'flex';
  } else if (type === 'date') {
    document.getElementById('editNotes').value = item.notes || '';
    document.getElementById('editImage').value = item.image || '';
    document.getElementById('editDate').value = item.completedDate || '';
    editPopup.style.display = 'flex';
  }
}

// Save edit changes
document.getElementById('saveEditButton').addEventListener('click', () => {
  const item = bucketItems.find(i => i.id === currentEditId);
  if (item) {
    item.notes = document.getElementById('editNotes').value.trim();
    item.image = document.getElementById('editImage').value.trim();
    const newDate = document.getElementById('editDate').value;
    if (newDate && item.completed) {
      item.completedDate = newDate;
    } else if (newDate && !item.completed) {
      if (confirm('Setting a completed date will mark this as completed. Continue?')) {
        item.completed = true;
        item.completedDate = newDate;
      }
    }
    saveData();
  }
  editPopup.style.display = 'none';
});

// --- Drag popup ---
function makeDraggable(elmnt, titleId) {
  let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
  const header = document.getElementById(titleId);
  if (header) {
    header.onmousedown = dragMouseDown;
  }
  
  function dragMouseDown(e) {
    e = e || window.event;
    e.preventDefault();
    pos3 = e.clientX;
    pos4 = e.clientY;
    document.onmouseup = closeDragElement;
    document.onmousemove = elementDrag;
  }
  
  function elementDrag(e) {
    e = e || window.event;
    e.preventDefault();
    pos1 = pos3 - e.clientX;
    pos2 = pos4 - e.clientY;
    pos3 = e.clientX;
    pos4 = e.clientY;
    elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
    elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
  }
  
  function closeDragElement() {
    document.onmouseup = null;
    document.onmousemove = null;
  }
}

makeDraggable(document.getElementById('bucketPopup'), 'popupTitleBar');
makeDraggable(document.getElementById('editPopup'), 'editTitleBar');

// Mobile height adjustment
function setMobileWindowHeight() {
  if (window.innerWidth <= 768) {
    const windowEl = document.querySelector('.window');
    if (windowEl) windowEl.style.height = window.innerHeight + 'px';
  }
}

window.addEventListener('load', () => {
  loadData();
  setMobileWindowHeight();
});
window.addEventListener('resize', setMobileWindowHeight);
</script>

</body>
</html>
